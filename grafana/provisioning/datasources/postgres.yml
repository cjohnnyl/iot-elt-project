apiVersion: 1

datasources:
  - name: PostgreSQL IoT
    type: postgres
    url: postgres:5432
    database: iot_data
    user: postgres
    secureJsonData:
      password: postgres
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
      postgresVersion: 1400
      timescaledb: false
    isDefault: true
    editable: true
